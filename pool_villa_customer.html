// ============================================
// IndexedDB
// ============================================
async function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('PoolVillaDB', 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('villas')) {
        database.createObjectStore('villas', { keyPath: 'id' });
      }
    };
  });
}

async function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('villas', 'readonly');
    const store = tx.objectStore('villas');
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

// ============================================
// Initialize
// ============================================
async function initData() {
  try {
    db = await openDB();
    const saved = await dbGetAll();
    
    if (saved.length === 0) {
      // ครั้งแรก - ใช้ default 105 หลัง
      villas = JSON.parse(JSON.stringify(defaultVillas));
      const tx = db.transaction('villas', 'readwrite');
      const store = tx.objectStore('villas');
      villas.forEach(v => store.put(v));
    } else if (saved.length < defaultVillas.length) {
      // ข้อมูลขาด - Merge
      const savedMap = new Map(saved.map(v => [v.id, v]));
      villas = defaultVillas.map(dv => savedMap.get(dv.id) || dv);
      const tx = db.transaction('villas', 'readwrite');
      const store = tx.objectStore('villas');
      store.clear();
      villas.forEach(v => store.put(v));
    } else {
      villas = saved;
    }
    render();
  } catch (err) {
    console.error(err);
    villas = JSON.parse(JSON.stringify(defaultVillas));
    render();
  }
}

// ============================================
// Sync
// ============================================
const bc = new BroadcastChannel('pool_villa_sync');
bc.onmessage = async (e) => {
  if (e.data.type === 'UPDATE' && db) {
    villas = await dbGetAll();
    render();
  }
};

// ============================================
// Render
// ============================================
function render() {
  updateStats();
  filterData();
}

function updateStats() {
  document.getElementById('statTotal').textContent = villas.length;
  document.getElementById('statPataya').textContent = villas.filter(v => v.zone === 'พัทยา').length;
  document.getElementById('statBangsarae').textContent = villas.filter(v => v.zone === 'บางเสร่').length;
}

function filterData() {
  const search = document.getElementById('search').value.toLowerCase();
  const zone = document.getElementById('zoneFilter').value;
  
  let filtered = villas;
  if (search) filtered = filtered.filter(v => (v.name || '').toLowerCase().includes(search) || (v.id || '').toLowerCase().includes(search));
  if (zone) filtered = filtered.filter(v => v.zone === zone);
  
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">🔍 ไม่พบบ้านที่ค้นหา</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(v => `
    <div class="card" onclick="window.open('${v.link}')">
      <div class="card-img">
        <div class="price-badge">${(v.customerPrice || v.price || 0).toLocaleString()}฿/คืน</div>
        🏠
      </div>
      <div class="card-body">
        <div class="card-id">${v.id}</div>
        <div class="card-title">${v.name || '-'}</div>
        <div class="card-info">
          <div class="info-item"><span class="info-label">โซน</span><span class="info-value">${v.zone}</span></div>
          <div class="info-item"><span class="info-label">ห้องนอน</span><span class="info-value">${v.beds} ห้อง</span></div>
          <div class="info-item"><span class="info-label">ที่ตั้ง</span><span class="info-value" style="font-size:12px;">${v.location}</span></div>
          <div class="info-item"><span class="info-label">สัตว์</span><span class="info-value" style="font-size:12px;">${v.pets}</span></div>
        </div>
        <button class="btn-detail">🔗 ดูรายละเอียด</button>
      </div>
    </div>
  `).join('');
}

initData();
</script>
