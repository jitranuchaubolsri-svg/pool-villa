function initData() {
  const saved = localStorage.getItem('sharedVillas');
  if (saved) {
    const savedVillas = JSON.parse(saved);
    // ถ้าข้อมูลที่เก็บมีจำนวนน้อยกว่า defaultVillas แปลว่าเป็นข้อมูลเก่า ให้ Update
    if (savedVillas.length < defaultVillas.length) {
      villas = JSON.parse(JSON.stringify(defaultVillas));
      localStorage.setItem('sharedVillas', JSON.stringify(villas));
    } else {
      villas = savedVillas;
    }
  } else {
    villas = JSON.parse(JSON.stringify(defaultVillas));
    localStorage.setItem('sharedVillas', JSON.stringify(villas));
  }
  render();
}


function render() {
  updateStats();
  filterData();
}

// BroadcastChannel - รับ update จาก Manager ทันที
const bc = new BroadcastChannel('pool_villa_sync');
bc.onmessage = function(e) {
  if (e.data.type === 'UPDATE') {
    villas = e.data.villas;
    localStorage.setItem('sharedVillas', JSON.stringify(villas));
    render();
  }
};

// Fallback: polling ทุก 2 วินาที (กรณีเปิดคนละหน้าต่าง)
setInterval(function() {
  const saved = localStorage.getItem('sharedVillas');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (JSON.stringify(parsed) !== JSON.stringify(villas)) {
      villas = parsed;
      render();
    }
  }
}, 2000);

function updateStats() {
  document.getElementById('statTotal').textContent = villas.length;
  document.getElementById('statPataya').textContent = villas.filter(v => v.zone === 'พัทยา').length;
  document.getElementById('statBangsarae').textContent = villas.filter(v => v.zone === 'บางเสร่').length;
}

function filterData() {
  const search = document.getElementById('search').value.toLowerCase();
  const zone = document.getElementById('zoneFilter').value;
  const beds = document.getElementById('bedFilter').value;
  
  const filtered = villas.filter(v => {
    const matchSearch = !search || v.name.toLowerCase().includes(search) || v.id.toLowerCase().includes(search);
    const matchZone = !zone || v.zone === zone;
    let matchBeds = true;
    if (beds === '2') matchBeds = v.beds === 2;
    else if (beds === '3-4') matchBeds = v.beds >= 3 && v.beds <= 4;
    else if (beds === '5') matchBeds = v.beds >= 5;
    return matchSearch && matchZone && matchBeds;
  });
  
  const grid = document.getElementById('villaGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column: 1/-1;"><div class="empty-icon">🏘️</div><div class="empty-text">ไม่พบบ้านตรงเงื่อนไข ลองค้นหาใหม่อีกครั้ง</div></div>';
    return;
  }
  
  grid.innerHTML = filtered.map(v => `
    <div class="card">
      <div class="card-img" style="background: ${v.image ? 'none' : 'linear-gradient(135deg, #ccc 0%, #999 100%)'}">
        ${v.image ? `<img src="${v.image}">` : '🏖️'}
        <div style="position: absolute; top: 12px; right: 12px; background: #e74c3c; color: white; padding: 8px 14px; border-radius: 20px; font-weight: 600; font-size: 14px;">${(v.customerPrice || v.price).toLocaleString('th-TH')}฿/คืน</div>
      </div>
      <div class="card-body">
        <div class="card-id">${v.id}</div>
        <div class="card-title">${v.name}</div>
        <div class="card-location">📍 ${v.location}</div>
        
        <div class="card-info">
          <div class="info-row">
            <span class="info-label">🛏️ ห้องนอน</span>
            <span class="info-value">${v.beds} ห้อง</span>
          </div>
          <div class="info-row">
            <span class="info-label">🏘️ โซน</span>
            <span class="info-value">${v.zone}</span>
          </div>
        </div>
        
        <button class="card-action" onclick="window.open('${v.link}', '_blank')">
          🔗 ดูรายละเอียดบ้าน
        </button>
      </div>
    </div>
  `).join('');
}

initData();
</script>
