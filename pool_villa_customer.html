<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เที่ยวไหนดี พูลวิลล่า - ค้นหาบ้านพัก</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; color: #333; }
    .header { background: #1a3a3a; color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .filter-bar { background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-wrap: wrap; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
    .card-img { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
    .card-body { padding: 20px; }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #1a3a3a; }
    .card-info { font-size: 14px; color: #666; margin-bottom: 12px; }
    .price-tag { background: #e74c3c; color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 18px; display: inline-block; }
    .btn-link { display: block; width: 100%; padding: 12px; background: #1a3a3a; color: white; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    .badge-zone { position: absolute; top: 12px; left: 12px; background: rgba(26, 58, 58, 0.9); color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; background: #fff; min-width: 150px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🏠 เที่ยวไหนดี พูลวิลล่า</h1>
  <p style="opacity: 0.8; margin-top: 5px; font-size: 14px;">จองพูลวิลล่าพัทยา บางเสร่ บ้านอำเภอ ราคาดีที่สุด</p>
</div>

<div class="filter-bar">
  <select id="filterZone" onchange="render()">
    <option value="ทั้งหมด">📍 ทุกโซน</option>
    <option value="พัทยา">พัทยา</option>
    <option value="บางเสร่">บางเสร่</option>
    <option value="บ้านอำเภอ">บ้านอำเภอ</option>
  </select>
  <select id="filterBeds" onchange="render()">
    <option value="ทั้งหมด">🛏️ ทุกขนาดห้องนอน</option>
    <option value="1">1 ห้องนอน</option>
    <option value="2">2 ห้องนอน</option>
    <option value="3">3 ห้องนอน</option>
    <option value="4">4 ห้องนอน</option>
    <option value="5">5 ห้องนอนขึ้นไป</option>
  </select>
</div>

<div class="container">
  <div class="grid" id="grid">
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAuI0m2sRMiyPsWeLZymklmku4DjyH-Etk",
    authDomain: "pool-villa-sync.firebaseapp.com",
    projectId: "pool-villa-sync",
    storageBucket: "pool-villa-sync.firebasestorage.app",
    messagingSenderId: "82378845389",
    appId: "1:82378845389:web:2dbd9d153cf74cf0a78d84"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let villas = [];

  // ฟังข้อมูลจาก Firebase
  db.collection("villas").onSnapshot((snapshot) => {
    villas = [];
    snapshot.forEach(doc => villas.push(doc.data()));
    render();
  });

  function render() {
    const grid = document.getElementById('grid');
    const fZone = document.getElementById('filterZone').value;
    const fBeds = document.getElementById('filterBeds').value;
    grid.innerHTML = '';
    
    const filtered = villas.filter(v => {
      const matchZone = fZone === 'ทั้งหมด' || v.zone === fZone;
      const vBeds = parseInt(v.beds) || 0;
      let matchBeds = true;
      if (fBeds !== 'ทั้งหมด') {
        if (fBeds === '5') { matchBeds = vBeds >= 5; }
        else { matchBeds = vBeds == parseInt(fBeds); }
      }
      return matchZone && matchBeds;
    });

   // ตรวจสอบว่าในฐานข้อมูลหลัก (สมมติชื่อตัวแปร data) มีข้อมูลไหม
if (!villas || villas.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #888;"><h3>กรุณารออัพเดตสักครู่</h3></div>';
    return;
}

// ถ้ามีข้อมูลในระบบ แต่ filter ออกมาแล้วไม่เหลืออะไรเลย (หาไม่เจอ)
if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #888;"><h3>ไม่พบผลลัพธ์ที่ตรงกับตัวเลือกของคุณ</h3><p>ลองปรับการค้นหาใหม่อีกครั้ง</p></div>';
    return;
}

    filtered.forEach(v => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="badge-zone">${v.zone || 'พัทยา'}</span>
        <img src="${v.image || 'https://via.placeholder.com/400x250?text=No+Image'}" class="card-img">
        <div class="card-body">
          <div class="card-title">${v.name || 'บ้านพักพูลวิลล่า'}</div>
          <div class="card-info">
            รหัสบ้าน : ${v.id}<br>
            🛏️ จำนวน: ${v.beds} ห้องนอน
          </div>
          <div style="font-size: 12px; color: #888;">ราคาเริ่มต้น</div>
          <div class="price-tag">${Number(v.customerPrice || 0).toLocaleString()} ฿</div>
          <a href="${v.link || '#'}" target="_blank" class="btn-link">กดดูรายละเอียด</a>
        </div>
      `;
      grid.appendChild(card);
    });
  }
</script>
</body>
</html>
