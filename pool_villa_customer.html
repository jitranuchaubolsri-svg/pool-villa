<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เที่ยวไหนดี พูลวิลล่า - Tiewnaide Poolvilla</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; color: #333; }
    .header { background: #1a3a3a; color: white; padding: 25px; text-align: center; }
    .filter-bar { background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
    .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
    .card-img { width: 100%; height: 220px; object-fit: cover; background: #ddd; }
    .card-body { padding: 20px; }
    .price-tag { background: #e74c3c; color: white; padding: 8px 18px; border-radius: 25px; font-weight: bold; font-size: 18px; display: inline-block; }
    .btn-view { display: block; width: 100%; padding: 13px; background: #1a3a3a; color: white; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div class="header">
  <h1>🏠 เที่ยวไหนดี พูลวิลล่า</h1>
</div>

<div class="filter-bar">
  <select id="filterZone" onchange="render()">
    <option value="ทั้งหมด">📍 ทุกโซน</option>
    <option value="พัทยา">พัทยา</option>
    <option value="บางเสร่">บางเสร่</option>
    <option value="บ้านอำเภอ">บ้านอำเภอ</option>
  </select>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAuI0m2sRMiyPsWeLZymklmku4DjyH-Etk",
    authDomain: "pool-villa-sync.firebaseapp.com",
    projectId: "pool-villa-sync",
    storageBucket: "pool-villa-sync.firebasestorage.app",
    messagingSenderId: "82378845389",
    appId: "1:82378845389:web:2dbd9d153cf74cf0a78d84"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  db.collection("villas").onSnapshot((snapshot) => {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    snapshot.forEach(doc => {
      const v = doc.data();
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${v.image || 'https://via.placeholder.com/400x250?text=No+Image'}" class="card-img">
        <div class="card-body">
          <div style="font-weight:bold; font-size:18px; margin-bottom:10px;">${v.name}</div>
          <div class="price-tag">${Number(v.customerPrice).toLocaleString()} ฿</div>
          <a href="${v.link || '#'}" target="_blank" class="btn-view">จองบ้านพัก</a>
        </div>
      `;
      grid.appendChild(card);
    });
  });
</script>
</body>
</html>
