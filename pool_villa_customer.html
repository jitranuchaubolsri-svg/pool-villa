<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏖️ เที่ยวไหนดี พูลวิลล่า - ค้นหาบ้านพัก</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #333; }
    .header { background: linear-gradient(135deg, #1a3a3a 0%, #2d5a5a 100%); color: white; padding: 2.5rem 1.5rem; text-align: center; }
    .filter-bar { background: white; padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: 0.3s; position: relative; }
    .card:hover { transform: translateY(-8px); }
    .price-badge { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
    .card-body { padding: 20px; }
    .card-title { font-size: 20px; font-weight: bold; color: #1a3a3a; margin-bottom: 10px; }
    .btn-book { display: block; width: 100%; padding: 12px; background: #27ae60; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🏖️ เที่ยวไหนดี พูลวิลล่า</h1>
  <p>ค้นหาบ้านพักพัทยา - บางเสร่ ราคาดีที่สุด</p>
</div>

<div class="filter-bar">
  <span>📍 โซน:</span>
  <select id="filterZone" style="padding:10px; border-radius:20px;" onchange="render()">
    <option value="ทั้งหมด">ทุกโซน</option>
    <option value="พัทยา">พัทยา</option>
    <option value="บางเสร่">บางเสร่</option>
  </select>
  <span>🛏️ ห้องนอน:</span>
  <select id="filterBeds" style="padding:10px; border-radius:20px;" onchange="render()">
    <option value="ทั้งหมด">ทุกขนาด</option>
    <option value="1">1 ห้องนอน</option>
    <option value="2">2 ห้องนอน</option>
    <option value="3">3 ห้องนอน</option>
    <option value="4">4 ห้องนอน</option>
    <option value="5">5 ห้องนอนขึ้นไป</option>
  </select>
</div>

<div class="container">
  <div id="status" style="text-align:center; color:#27ae60; font-weight:bold; margin-bottom:20px;">🔄 อัปเดตข้อมูล...</div>
  <div class="grid" id="grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAuI0m2sRMiyPsWeLZymklmku4DjyH-Etk",
    authDomain: "pool-villa-sync.firebaseapp.com",
    projectId: "pool-villa-sync",
    storageBucket: "pool-villa-sync.firebasestorage.app",
    messagingSenderId: "82378845389",
    appId: "1:82378845389:web:2dbd9d153cf74cf0a78d84"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let villas = [];

  db.collection("villas").onSnapshot((snapshot) => {
    villas = [];
    snapshot.forEach(doc => villas.push(doc.data()));
    document.getElementById('status').textContent = `✨ พบบ้านพักว่าง ${villas.length} หลัง`;
    render();
  });

  function render() {
    const grid = document.getElementById('grid');
    const fZone = document.getElementById('filterZone').value;
    const fBeds = document.getElementById('filterBeds').value;
    grid.innerHTML = '';
    
    const filtered = villas.filter(v => {
      const matchZone = fZone === 'ทั้งหมด' || v.zone === fZone;
      const vBeds = parseInt(v.beds) || 0;
      const matchBeds = fBeds === 'ทั้งหมด' || (fBeds === '5' ? (vBeds >= 5) : (vBeds == parseInt(fBeds)));
      return matchZone && matchBeds;
    });

    filtered.forEach(v => {
      const card = document.createElement('div');
      card.className = 'card';
      const price = Number(v.customerPrice || 0).toLocaleString();
      card.innerHTML = `
        <div class="price-badge">${price}.-</div>
        <img src="${v.image || 'https://via.placeholder.com/400x250'}" class="card-img">
        <div class="card-body">
          <div class="card-title">${v.name || 'พูลวิลล่าพัทยา'}</div>
          <div style="font-size:14px; color:#666;">📍 โซน: ${v.zone} | 🛏️ ${v.beds} ห้องนอน</div>
          <a href="${v.link || '#'}" target="_blank" class="btn-book">🔗 ดูรายละเอียด/จอง</a>
        </div>
      `;
      grid.appendChild(card);
    });
  }
</script>
</body>
</html>
