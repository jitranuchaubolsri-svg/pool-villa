    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    
    .card { background: white; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
    .card-img { width: 100%; height: 170px; background: linear-gradient(135deg, #ccc 0%, #999 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

    .card-img-emoji { font-size: 50px; }
    .price-badge { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 2; }
    .img-buttons { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; gap: 6px; z-index: 3; }
    .img-btn { flex: 1; padding: 6px 10px; background: rgba(255,255,255,0.95); border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .img-btn.danger { background: rgba(231,76,60,0.95); color: white; }
    
    .card-body { padding: 1.2rem; }
    .card-id { font-size: 11px; color: #999; margin-bottom: 4px; font-weight: 600; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }

    .info-value { color: #e74c3c; font-weight: 500; }

    .btn-card { flex: 1; padding: 8px 12px; border: 1px solid #ddd; background: white; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .btn-edit { background: #3498db; color: white; border: none; }
    .btn-del { background: #e74c3c; color: white; border: none; }
    
    .sidebar-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .stat { background: #f9f9f9; padding: 12px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #e74c3c; }
    .stat-label { font-size: 11px; color: #999; text-transform: uppercase; }
    .stat-value { font-size: 26px; font-weight: 700; color: #1a3a3a; margin-top: 3px; }
    .sync-status { padding: 10px; border-radius: 5px; font-size: 12px; font-weight: 500; margin-bottom: 1rem; }
    .sync-status.ok { background: #e8f5e9; border-left: 4px solid #27ae60; color: #2d5a2d; }
    .sync-status.warn { background: #fff3cd; border-left: 4px solid #ff9800; color: #856404; }
    .sync-status.error { background: #fee; border-left: 4px solid #e74c3c; color: #c0392b; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 10px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; }

    .form-label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }

    .btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }

    .btn-cancel { flex: 1; padding: 12px; background: #ecf0f1; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
    
    .loading { text-align: center; padding: 40px; color: #999; grid-column: 1/-1; }
    .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #e74c3c; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }

    .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 10000; font-weight: 500; }

// Firebase functions
async function syncToFirebase() {
  if (!firebaseReady || !db) {
    showToast('❌ Firebase ไม่พร้อม', 'error');
    return;
  }
  
  showToast('🔄 กำลัง Sync...');
  updateStatus('🔄 กำลัง Sync ขึ้น Firebase...', 'warn');
  
  try {
    let count = 0;
    for (const v of villas) {
      const data = {
        id: v.id,
        name: v.name || '',
        location: v.location || '',
        beds: v.beds || 0,
        zone: v.zone || '',
        pets: v.pets || '',
        link: v.link || '',
        price: v.price || 0,
        customerPrice: v.customerPrice || 0
      };
      await setDoc(doc(db, 'villas', v.id), data);
      count++;
      if (count % 20 === 0) {
        updateStatus('🔄 Sync: ' + count + '/' + villas.length, 'warn');
      }
    }
    updateStatus('✓ Sync สำเร็จ (' + count + ' หลัง)', 'ok');
    showToast('✓ Sync Firebase สำเร็จ');
  } catch(err) {
    console.error('Sync error:', err);
    updateStatus('❌ Sync ไม่สำเร็จ: ' + err.message, 'error');
    showToast('❌ Sync Firebase ไม่ได้', 'error');
  }
}

async function loadFromFirebase() {
  if (!firebaseReady || !db) return;
  
  try {
    const snapshot = await getDocs(collection(db, 'villas'));
    if (snapshot.size === 0) {
      updateStatus('⏳ Firebase ยังไม่มีข้อมูล (กด Sync เพื่อ upload)', 'warn');
      return;
    }
    
    const firebaseVillas = [];
    snapshot.forEach(docSnap => {
      const v = docSnap.data();
      const localV = villas.find(x => x.id === v.id);
      v.image = localV ? localV.image : null;
      firebaseVillas.push(v);
    });
    
    villas = firebaseVillas;
    render();
    updateStatus('✓ ดึงข้อมูลจาก Firebase (' + villas.length + ' หลัง)', 'ok');
  } catch(err) {
    console.error('Load Firebase error:', err);
    updateStatus('❌ ดึงข้อมูล Firebase ไม่ได้', 'error');
  }
}

function updateStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'sync-status ' + (type || 'warn');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function render() {
  updateStats();
  filterData();
}

function updateStats() {
  document.getElementById('statTotal').textContent = villas.length;
  document.getElementById('statPataya').textContent = villas.filter(v => v.zone === 'พัทยา').length;
  document.getElementById('statBangsarae').textContent = villas.filter(v => v.zone === 'บางเสร่').length;
}

function filterData() {
  const search = document.getElementById('search').value.toLowerCase();
  const zone = document.getElementById('zoneFilter').value;
  const beds = document.getElementById('bedsFilter').value;
  
  let filtered = villas.slice();
  if (search) filtered = filtered.filter(v => (v.name||'').toLowerCase().includes(search) || (v.id||'').toLowerCase().includes(search));
  if (zone) filtered = filtered.filter(v => v.zone === zone);
  if (beds) {
    if (beds === '8+') filtered = filtered.filter(v => v.beds >= 8);
    else filtered = filtered.filter(v => v.beds === parseInt(beds));
  }
  
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:40px; text-align:center; color:#999; grid-column:1/-1;';
    empty.textContent = 'ไม่พบข้อมูล';
    grid.appendChild(empty);
    return;
  }
  
  filtered.forEach(v => grid.appendChild(createCard(v)));
}

function createCard(v) {
  const card = document.createElement('div');
  card.className = 'card';
  
  const imgDiv = document.createElement('div');
  imgDiv.className = 'card-img';
  
  const priceBadge = document.createElement('div');
  priceBadge.className = 'price-badge';
  priceBadge.textContent = (v.customerPrice || v.price || 0).toLocaleString() + '฿';
  imgDiv.appendChild(priceBadge);
  
  const hasImg = v.image && v.image.length > 10;
  if (hasImg) {
    const img = document.createElement('img');
    img.src = v.image;
    img.alt = v.name || '';
    imgDiv.appendChild(img);
  } else {
    const emoji = document.createElement('div');
    emoji.className = 'card-img-emoji';
    emoji.textContent = '🏠';
    imgDiv.appendChild(emoji);
  }
  
  const imgBtns = document.createElement('div');
  imgBtns.className = 'img-buttons';
  
  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'img-btn';
  uploadBtn.textContent = hasImg ? '📷 เปลี่ยน' : '📷 Upload';
  uploadBtn.onclick = e => { e.stopPropagation(); uploadImage(v.id); };
  imgBtns.appendChild(uploadBtn);
  
  if (hasImg) {
    const delBtn = document.createElement('button');
    delBtn.className = 'img-btn danger';
    delBtn.textContent = '🗑️ ลบรูป';
    delBtn.onclick = e => { e.stopPropagation(); deleteImage(v.id); };
    imgBtns.appendChild(delBtn);
  }
  imgDiv.appendChild(imgBtns);
  card.appendChild(imgDiv);
  
  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = '<div class="card-id">' + escapeHtml(v.id) + '</div>' +
    '<div class="card-title">' + escapeHtml(v.name || '-') + '</div>' +
    '<div class="info-item"><span>โซน</span><span class="info-value">' + escapeHtml(v.zone||'') + '</span></div>' +
    '<div class="info-item"><span>ห้องนอน</span><span class="info-value">' + v.beds + '</span></div>' +
    '<div class="info-item"><span>สัตว์เลี้ยง</span><span class="info-value" style="font-size:12px;">' + escapeHtml(v.pets||'-') + '</span></div>';
  card.appendChild(body);
  
  const actions = document.createElement('div');
  actions.className = 'card-actions';
  
  const linkBtn = document.createElement('button');
  linkBtn.className = 'btn-card';
  linkBtn.textContent = '🔗 Link';
  linkBtn.onclick = () => window.open(v.link, '_blank');
  actions.appendChild(linkBtn);
  
  const editBtn = document.createElement('button');
  editBtn.className = 'btn-card btn-edit';
  editBtn.textContent = '✏️ แก้ไข';
  editBtn.onclick = () => openEditModal(v.id);
  actions.appendChild(editBtn);
  
  const delVillaBtn = document.createElement('button');
  delVillaBtn.className = 'btn-card btn-del';
  delVillaBtn.textContent = '🗑️';
  delVillaBtn.onclick = () => deleteVilla(v.id);
  actions.appendChild(delVillaBtn);
  
  card.appendChild(actions);
  return card;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resizeImage(img, maxW, quality) {
  const canvas = document.createElement('canvas');
  let w = img.width, h = img.height;
  if (w > maxW) { h = (h * maxW) / w; w = maxW; }
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', quality);
}

function uploadImage(id) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    if (!e.target.files[0]) return;
    showToast('📤 อัพโหลด...');
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const resized = resizeImage(img, 800, 0.7);
        const v = villas.find(x => x.id === id);
        if (v) {
          v.image = resized;
          render();
          showToast('✓ อัพโหลดรูปสำเร็จ');
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  };
  input.click();
}

function deleteImage(id) {
  if (!confirm('ลบรูปนี้?')) return;
  const v = villas.find(x => x.id === id);
  if (v) {
    v.image = null;
    render();
    showToast('✓ ลบรูปสำเร็จ');
  }
}

    try {
      const data = {
        id: v.id, name: v.name, location: v.location,
        beds: v.beds, zone: v.zone, pets: v.pets,
        link: v.link, price: v.price, customerPrice: v.customerPrice
      };
      await setDoc(doc(db, 'villas', v.id), data);
      showToast('✓ บันทึกสำเร็จ (Sync Firebase)');
    } catch(err) {
      console.error(err);
      showToast('✓ บันทึก Local (Firebase ไม่ได้)');
    }
  } else {
    showToast('✓ บันทึก Local');
  }
  
  render();
  closeModal();
}

async function saveAdd() {
  const newVilla = {
    id: document.getElementById('fId').value,
    name: document.getElementById('fName').value,
    zone: document.getElementById('fZone').value,
    beds: parseInt(document.getElementById('fBeds').value),
    location: document.getElementById('fLoc').value,
    price: parseInt(document.getElementById('fPrice').value) || 0,
    customerPrice: parseInt(document.getElementById('fCustomerPrice').value) || 0,
    pets: document.getElementById('fPets').value,
    link: document.getElementById('fLink').value,
    image: currentImage
  };
  
  if (!newVilla.id) {
    showToast('❌ ต้องใส่รหัส', 'error');
    return;
  }
  
  villas.push(newVilla);
  
  if (firebaseReady && db) {
    try {
      const data = { ...newVilla };
      delete data.image;
      await setDoc(doc(db, 'villas', newVilla.id), data);
      showToast('✓ เพิ่มบ้านสำเร็จ (Sync Firebase)');
    } catch(err) {
      showToast('✓ เพิ่ม Local');
    }
  } else {
    showToast('✓ เพิ่มบ้านสำเร็จ');
  }
  
  render();
  closeModal();
}

async function deleteVilla(id) {
  if (!confirm('ลบบ้านนี้?')) return;
  villas = villas.filter(v => v.id !== id);
  
  if (firebaseReady && db) {
    try {
      await deleteDoc(doc(db, 'villas', id));
    } catch(err) { console.error(err); }
  }
  
  render();
  showToast('✓ ลบสำเร็จ');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
}

function resetToDefault() {
  if (!confirm('Reset ข้อมูล 105 หลัง?')) return;
  villas = JSON.parse(JSON.stringify(defaultVillas));
  render();
  showToast('✓ Reset สำเร็จ');
}

function exportCSV() {
  const headers = 'ID,Name,Location,Beds,Zone,Pets,Price,CustomerPrice,Link';
  const rows = villas.map(v => v.id + ',"' + (v.name||'') + '","' + (v.location||'') + '",' + v.beds + ',' + v.zone + ',"' + (v.pets||'') + '",' + (v.price||0) + ',' + (v.customerPrice||0) + ',"' + (v.link||'') + '"');
  const csv = headers + '\n' + rows.join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'villas.csv';
  link.click();
  showToast('✓ Export สำเร็จ');
}

// Event listeners
document.getElementById('btnSync').onclick = syncToFirebase;
document.getElementById('btnReset').onclick = resetToDefault;
document.getElementById('btnExport').onclick = exportCSV;
document.getElementById('btnAdd').onclick = openAddModal;
document.getElementById('search').oninput = filterData;
document.getElementById('zoneFilter').onchange = filterData;
document.getElementById('bedsFilter').onchange = filterData;
</script>
