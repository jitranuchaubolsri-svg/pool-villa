<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiewnaide Manager - Fixed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; color: #333; }
    .header { background: #1a3a3a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .filter-bar { background: white; padding: 15px 2rem; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
    .card-img { width: 100%; height: 180px; background: #eee; border-radius: 8px; object-fit: cover; margin-bottom: 12px; }
    .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-add { background: #27ae60; color: white; padding: 10px 20px; }
    .btn-edit { background: #2980b9; color: white; width: 100%; margin-top: 10px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; }
    .form-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🏠 Tiewnaide Manager</h1>
  <button class="btn btn-add" onclick="openAdd()">+ เพิ่มบ้านใหม่</button>
</div>

<div class="filter-bar">
  <div id="status" style="font-weight: bold; color: #27ae60;">✅ ระบบพร้อมใช้งาน (กดเพิ่มบ้านได้เลย)</div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h2 id="modalTitle">เพิ่มบ้านใหม่</h2>
    <input type="text" id="fId" class="form-input" placeholder="รหัสบ้าน (เช่น DV-001)">
    <input type="text" id="fName" class="form-input" placeholder="ชื่อบ้านพัก">
    <input type="number" id="fPrice" class="form-input" placeholder="ราคาขาย">
    <button class="btn btn-add" style="width: 100%; margin-top: 15px;" onclick="saveVilla()">💾 บันทึกข้อมูล</button>
    <button class="btn" style="width: 100%; margin-top: 10px; background:#ccc;" onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAuI0m2sRMiyPsWeLZymklmku4DjyH-Etk",
    authDomain: "pool-villa-sync.firebaseapp.com",
    projectId: "pool-villa-sync",
    storageBucket: "pool-villa-sync.firebasestorage.app",
    messagingSenderId: "82378845389",
    appId: "1:82378845389:web:2dbd9d153cf74cf0a78d84"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let villas = [];

  // ดึงข้อมูลมาแสดงผล
  db.collection("villas").onSnapshot((snapshot) => {
    villas = [];
    snapshot.forEach(doc => villas.push(doc.data()));
    render();
  });

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    villas.forEach(v => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div style="font-weight:bold;">${v.name || 'ไม่มีชื่อ'}</div>
        <div style="font-size:12px; color:gray;">ID: ${v.id}</div>
        <div style="color:red; font-weight:bold;">${Number(v.customerPrice).toLocaleString()} ฿</div>
        <button class="btn btn-edit" onclick="openEdit('${v.id}')">✏️ แก้ไข</button>
      `;
      grid.appendChild(card);
    });
  }

  function openAdd() {
    document.getElementById('fId').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fPrice').value = '';
    document.getElementById('editModal').classList.add('show');
  }

  async function saveVilla() {
    const id = document.getElementById('fId').value;
    const data = {
      id: id,
      name: document.getElementById('fName').value,
      customerPrice: parseInt(document.getElementById('fPrice').value) || 0
    };
    if(!id) return alert("กรุณาใส่รหัสบ้าน");
    await db.collection("villas").doc(id).set(data, {merge: true});
    closeModal();
  }

  function closeModal() { document.getElementById('editModal').classList.remove('show'); }
</script>

</body>
</html>
