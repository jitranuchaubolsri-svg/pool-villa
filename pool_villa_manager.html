    .sidebar-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 1.5rem; }
    .sidebar-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .stat { background: #f9f9f9; padding: 12px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #e74c3c; }

// ============================================
// IndexedDB
// ============================================
async function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('PoolVillaDB', 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('villas')) {
        database.createObjectStore('villas', { keyPath: 'id' });
      }
    };
  });
}

async function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('villas', 'readonly');
    const store = tx.objectStore('villas');
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function dbSaveAll(villaList) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('villas', 'readwrite');
    const store = tx.objectStore('villas');
    store.clear();
    villaList.forEach(v => store.put(v));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbPutOne(villa) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('villas', 'readwrite');
    const store = tx.objectStore('villas');
    store.put(villa);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDeleteOne(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('villas', 'readwrite');
    const store = tx.objectStore('villas');
    store.delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ============================================
// Toast
// ============================================
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (type || '');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ============================================
// Init
// ============================================
async function initData() {
  try {
    db = await openDB();
    const saved = await dbGetAll();
    
    if (saved.length === 0) {
      // ครั้งแรก - ใช้ default 105 หลัง
      villas = JSON.parse(JSON.stringify(defaultVillas));
      await dbSaveAll(villas);
      showToast('✓ โหลดข้อมูลเริ่มต้น 105 หลัง');
    } else if (saved.length < defaultVillas.length) {
      // ข้อมูลขาด - Merge: เก็บของเดิม + เพิ่มบ้านที่ขาด
      const savedMap = new Map(saved.map(v => [v.id, v]));
      villas = defaultVillas.map(dv => savedMap.get(dv.id) || dv);
      await dbSaveAll(villas);
      const added = villas.length - saved.length;
      showToast('✓ เพิ่ม ' + added + ' หลัง (รวม ' + villas.length + ')');
    } else {
      villas = saved;
    }
    render();
  } catch (err) {
    console.error(err);
    villas = JSON.parse(JSON.stringify(defaultVillas));
    render();
  }
}

async function resetToDefault() {
  if (!confirm('Reset เป็น 105 หลังเริ่มต้น?')) return;
  villas = JSON.parse(JSON.stringify(defaultVillas));
  await dbSaveAll(villas);
  bc.postMessage({ type: 'UPDATE' });
  render();
  showToast('✓ Reset สำเร็จ');
}

// ============================================
// BroadcastChannel
// ============================================
const bc = new BroadcastChannel('pool_villa_sync');
bc.onmessage = async (e) => {
  if (e.data.type === 'UPDATE' && db) {
    villas = await dbGetAll();
    render();
  }
};

// ============================================
// Render
// ============================================
function render() {
  updateStats();
  filterData();
}

function updateStats() {
  document.getElementById('statTotal').textContent = villas.length;
  document.getElementById('statPataya').textContent = villas.filter(v => v.zone === 'พัทยา').length;
  document.getElementById('statBangsarae').textContent = villas.filter(v => v.zone === 'บางเสร่').length;
}

function filterData() {
  const search = document.getElementById('search').value.toLowerCase();
  const zone = document.getElementById('zoneFilter').value;
  
  let filtered = villas;
  if (search) filtered = filtered.filter(v => (v.name || '').toLowerCase().includes(search) || (v.id || '').toLowerCase().includes(search));
  if (zone) filtered = filtered.filter(v => v.zone === zone);
  
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="padding:40px; text-align:center; color:#999; grid-column:1/-1;">ไม่พบข้อมูล</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(v => `
    <div class="card">
      <div class="card-img">
        <div class="price-badge">${(v.customerPrice || v.price || 0).toLocaleString()}฿</div>
        <span style="font-size:60px;">🏠</span>
      </div>
      <div class="card-body">
        <div class="card-id">${v.id}</div>
        <div class="card-title">${v.name || '-'}</div>
        <div class="card-info">
          <div class="info-item"><span class="info-label">โซน</span><span class="info-value">${v.zone}</span></div>
          <div class="info-item"><span class="info-label">ห้อง</span><span class="info-value">${v.beds}</span></div>
          <div class="info-item"><span class="info-label">สัตว์เลี้ยง</span><span class="info-value" style="font-size:12px;">${v.pets}</span></div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-card" onclick="window.open('${v.link}')">Link</button>
        <button class="btn-card btn-edit" onclick="openEditModal('${v.id}')">แก้ไข</button>
        <button class="btn-card btn-del" onclick="deleteVilla('${v.id}')">ลบ</button>
      </div>
    </div>
  `).join('');
}

async function saveEdit() {
  const v = villas.find(x => x.id === currentEditId);
  if (!v) return;
  
  v.id = document.getElementById('fId').value;
  v.name = document.getElementById('fName').value;
  v.zone = document.getElementById('fZone').value;
  v.beds = parseInt(document.getElementById('fBeds').value);
  v.location = document.getElementById('fLoc').value;
  v.price = parseInt(document.getElementById('fPrice').value);
  v.customerPrice = parseInt(document.getElementById('fCustomerPrice').value);
  v.pets = document.getElementById('fPets').value;
  v.link = document.getElementById('fLink').value;
  
  try {
    await dbPutOne(v);
    bc.postMessage({ type: 'UPDATE' });
    render();
    closeModal();
    showToast('✓ บันทึกสำเร็จ');
  } catch (err) {
    showToast('❌ บันทึกไม่ได้', 'error');
  }
}

async function saveAdd() {
  const newVilla = {
    id: document.getElementById('fId').value,
    name: document.getElementById('fName').value,
    zone: document.getElementById('fZone').value,
    beds: parseInt(document.getElementById('fBeds').value),
    location: document.getElementById('fLoc').value,
    price: parseInt(document.getElementById('fPrice').value),
    customerPrice: parseInt(document.getElementById('fCustomerPrice').value),
    pets: document.getElementById('fPets').value,
    link: document.getElementById('fLink').value,
    image: null
  };
  
  if (villas.find(v => v.id === newVilla.id)) {
    showToast('❌ รหัสนี้มีอยู่แล้ว', 'error');
    return;
  }
  
  try {
    villas.push(newVilla);
    await dbPutOne(newVilla);
    bc.postMessage({ type: 'UPDATE' });
    render();
    closeModal();
    showToast('✓ เพิ่มบ้านใหม่สำเร็จ');
  } catch (err) {
    showToast('❌ เพิ่มไม่ได้', 'error');
  }
}

async function deleteVilla(id) {
  if (!confirm('ลบบ้านนี้?')) return;
  
  try {
    await dbDeleteOne(id);
    villas = villas.filter(v => v.id !== id);
    bc.postMessage({ type: 'UPDATE' });
    render();
    showToast('✓ ลบสำเร็จ');
  } catch (err) {
    showToast('❌ ลบไม่ได้', 'error');
  }
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
}

function exportCSV() {
  const headers = 'ID,Name,Location,Beds,Zone,Pets,Price,CustomerPrice,Link';
  const rows = villas.map(v => `${v.id},"${v.name}","${v.location}",${v.beds},${v.zone},"${v.pets}",${v.price},${v.customerPrice},"${v.link}"`);
  const csv = [headers, ...rows].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'villas.csv';
  link.click();
  showToast('✓ Export สำเร็จ');
}
