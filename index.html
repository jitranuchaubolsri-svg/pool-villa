<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏖️ Pool Villa Pattaya - 105 หลัง</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a3a3a 0%, #2d5a5a 50%, #e74c3c 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 900px; width: 100%; text-align: center; }
    h1 { color: white; font-size: 42px; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
    .subtitle { color: rgba(255,255,255,0.9); font-size: 18px; margin-bottom: 50px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
    @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 32px; } }
    .card { background: white; border-radius: 15px; padding: 40px 30px; text-decoration: none; color: #1a3a3a; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: all 0.3s; display: block; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .card-icon { font-size: 60px; margin-bottom: 20px; }
    .card-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .card-desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px; }
    .card-btn { display: inline-block; padding: 12px 30px; background: #e74c3c; color: white; border-radius: 25px; font-weight: 600; }
    .footer { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 30px; }
    .stats { color: rgba(255,255,255,0.8); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏖️ Pool Villa Pattaya</h1>
    <p class="subtitle">ระบบจัดการบ้านพูลวิลล่า 105 หลัง</p>
    <p class="stats">พัทยา 86 + บางเสร่ 19</p>
    
    <div class="grid">
      <a href="pool_villa_customer.html" class="card">
        <div class="card-icon">🔍</div>
        <div class="card-title">ลูกค้า</div>
        <div class="card-desc">ดูรายการบ้านพักทั้งหมด<br>ค้นหา / กรองตามความต้องการ</div>
        <span class="card-btn">เข้าชมบ้าน</span>
      </a>
      
      <a href="pool_villa_manager.html" class="card">
        <div class="card-icon">⚙️</div>
        <div class="card-title">แอดมิน</div>
        <div class="card-desc">จัดการข้อมูลบ้าน<br>แก้ไข / เพิ่ม / ลบ</div>
        <span class="card-btn">เข้าระบบ</span>
      </a>
    </div>
    
    <p class="footer">✨ IndexedDB ไม่บัค ไม่หลุด ไม่รอนาน</p>
  </div>
</body>
</html>
